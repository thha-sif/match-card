<!doctype html>
<html lang="sv">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="public, max-age=864000" />
  <meta name="description" content="Skapa anpassade matchkort, resultatannonseringar och grafik till sociala medier för fotboll." />
  <title>Bildgenerator</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="wrap">
    <header class="topbar">
      <h2>Bildgenerator till sociala medier för Säters IF Fotboll</h2>
    </header>

    <div class="tabs">
      <button class="tab active" data-template="match">Matchkort</button>
      <button class="tab" data-template="final">Resultat</button>
      <button class="tab" data-template="signing">Nyförvärv</button>
      <button class="tab" data-template="announce">Inlägg</button>
    </div>

    <main class="grid">
      <section class="panel">
        <h2>Inställningar</h2>

        <div class="form">
          <!-- MATCHSELECT: endast match + final -->
          <div class="templateFields" data-template="match" data-template-alt="final">
            <label>
              Välj match
              <select id="matchSelect" disabled>
                <option value="">— Ladda CSV först —</option>
              </select>
            </label>
          </div>


          <!-- MATCH -->
          <div class="templateFields" data-template="match">
            <label>
              Rubrik
              <input id="bannerText" type="text" value="MATCHDAG" />
            </label>

            <div class="row">
              <label>
                Serie
                <input id="league" type="text" value="" />
              </label>

              <label>
                Omgång
                <input id="round" type="number" inputmode="numeric" />
              </label>
            </div>

            <div class="row">
              <label>
                Hemmalag
                <input id="homeTeam" type="text" value="Säters IF FK" />
              </label>
              
              <label>
                Bortalag
                <input id="awayTeam" type="text" value="" />
              </label>
            </div> 

            <div class="row">
              <label>
                Datum
                <input id="date" type="date" />
              </label>
              <label>
                Tid
                <input id="time" type="time" value="19:00" />
              </label>
            </div>

            <label>
              Plats
              <input id="venue" type="text" value="Säters IP" />
            </label>

            <div class="row">
              <label>
                Hemmalogga (vid behov)
                <input id="homeLogoMatch" type="file" accept="image/*" />
              </label>
              <label>
                Bortalogga (vid behov)
                <input id="awayLogoMatch" type="file" accept="image/*" />
              </label>
            </div>
          </div>

          <!-- FINAL -->
          <div class="templateFields" data-template="final" style="display:none;">
            <div class="row">
              <label>
                Hemmalogga (vid behov)
                <input id="homeLogoFinal" type="file" accept="image/*" />
              </label>
              <label>
                Bortalogga (vid behov)
                <input id="awayLogoFinal" type="file" accept="image/*" />
              </label>
            </div>

            <div class="row">
              <label>
                Hemma
                <input id="homeScore" type="number" inputmode="numeric" min="0" value="0" />
              </label>
              <label>
                Borta
                <input id="awayScore" type="number" inputmode="numeric" min="0" value="0" />
              </label>
            </div>

            <div class="scorersGrid">
              <label>
                Valfritt: Namn + minut (ex. "Andersson 23 90+2")
                <div class="scorersRow">
                  <input class="scorerName" name="sc_home_name_0" data-side="home" data-row="0" placeholder="Hemma" />
                  <input class="scorerMin" data-side="home" data-row="0" placeholder="19" />
                  <input class="scorerName" name="sc_away_name_0" data-side="away" data-row="0" placeholder="Borta" />
                  <input class="scorerMin" data-side="away" data-row="0" placeholder="54" />
                </div>
                <div class="scorersRow">
                  <input class="scorerName" name="sc_home_name_1" data-side="home" data-row="1" placeholder="Hemma" />
                  <input class="scorerMin" data-side="home" data-row="1" placeholder="19" />
                  <input class="scorerName" name="sc_away_name_1" data-side="away" data-row="1" placeholder="Borta" />
                  <input class="scorerMin" data-side="away" data-row="1" placeholder="54" />
                </div>
                <div class="scorersRow">
                  <input class="scorerName" name="sc_home_name_2" data-side="home" data-row="2" placeholder="Hemma" />
                  <input class="scorerMin" data-side="home" data-row="2" placeholder="19" />
                  <input class="scorerName" name="sc_away_name_2" data-side="away" data-row="2" placeholder="Borta" />
                  <input class="scorerMin" data-side="away" data-row="2" placeholder="54" />
                </div>
                <div class="scorersRow">
                  <input class="scorerName" name="sc_home_name_3" data-side="home" data-row="3" placeholder="Hemma" />
                  <input class="scorerMin" data-side="home" data-row="3" placeholder="19" />
                  <input class="scorerName" name="sc_away_name_3" data-side="away" data-row="3" placeholder="Borta" />
                  <input class="scorerMin" data-side="away" data-row="3" placeholder="54" />
                </div>
                <div class="scorersRow">
                  <input class="scorerName" name="sc_home_name_4" data-side="home" data-row="4" placeholder="Hemma" />
                  <input class="scorerMin" data-side="home" data-row="4" placeholder="19" />
                  <input class="scorerName" name="sc_away_name_4" data-side="away" data-row="4" placeholder="Borta" />
                  <input class="scorerMin" data-side="away" data-row="4" placeholder="54" />
                </div>
              </label>
            </div>

            <label>
              Valfritt: Alternativ text (visas istället för målskyttar)
              <input id="finalMessage" type="text" placeholder="Tack till publiken!" />
            </label>
          </div>

          <!-- SIGNING / NYFÖRVÄRV: endast dessa + format -->
          <div class="templateFields" data-template="signing" style="display:none;">
            <label>
              Profilbild (PNG/JPG)
              <input id="playerImage" type="file" accept="image/*" />
            </label>

          <label>
            Förnamn
            <input id="playerFirstName" type="text" placeholder="Förnamn" />
          </label>
          
          <label>
            Efternamn
            <input id="playerLastName" type="text" placeholder="Efternamn" />
          </label>

            <label>
              Nummer
              <input id="playerNumber" type="number" inputmode="numeric" min="0" placeholder="99" />
            </label>

          </div>

          <!-- ANNOUNCE -->
          <div class="templateFields" data-template="announce" style="display:none;">

            <label>
              Bakgrund (valfri bild)
              <input id="announceBackground" type="file" accept="image/*" />
            </label>

            <label>
              Rubrik
              <input id="announceTitle" type="text" placeholder="Rubrik" />
            </label>

            <label>
              Brödtext
              <textarea id="announceBody" rows="5" placeholder="Skriv din text här…"></textarea>
            </label>
          
            <label>
              Sidfot
              <input id="announceFooter" type="text" placeholder="laget.se/satersiffk" maxlength="20"/>
            </label>
          
            <label>
              Sidfotens färg
              <select id="announceFooterColor">
                <option value="blue" selected>Säterblå (allmänt)</option>
                <option value="green">Tallgrön (folkhälsa, gåfotboll)</option>
                <option value="woodred">Träröd (övriga meddelanden)</option>
              </select>
            </label>
          </div>
          
          <div class="templateFields" data-template="final" style="display:none;">
            <label>
              Ladda gärna upp bild från matchen (ersätter bakgrund)
              <input id="finalBackground" type="file" accept="image/*" />
            </label>
          </div>

          <!-- BAKGRUND: match + final + announce (döljs på signing) -->
          <div class="templateFields" data-template="match" data-template-alt="final" data-template-alt2="announce">
            <label>
              Bakgrund
              <select id="bgSelect"></select>
            </label>
          </div>
          
          <!-- FORMAT: visas på alla templates (inkl. signing) -->
          <label>
            Bildformat
            <select id="format">
              <option value="1080x1350" selected>Inlägg Facebook/Instagram (1080 x 1350)</option>
              <option value="1080x1920">Story Facebook/Instagram (1080 x 1920)</option>
            </select>
          </label>

          <br>

          <!-- CSV: endast match -->
          <div class="templateFields" data-template="match">
            <label>
              Valfritt: Importera matchdata via CSV
            </label>
            <div class="row csvControlsRow">
              <input id="csvFile" type="file" accept=".csv,text/csv" />
              <button id="loadCsvBtn" class="btn">Läs CSV</button>
            </div>
          </div>
        </div>
      </section>

      <section class="preview">
        <h2>Förhandsvisning</h2>
        <div class="canvasWrap">
          <canvas id="card"></canvas>
        </div>

        <div class="actions">
          <button id="resetBtn" class="btn">✖ Återställ</button>
          <button id="renderBtn" class="btn">↻ Uppdatera</button>
          <button id="downloadBtn" class="btn primary">⬇ Ladda ned</button>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>

</html>
