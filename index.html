<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Matchkort-generator</title>
<!--   <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Teko:wght@600;700;800&display=swap" rel="stylesheet"> -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <h1>Matchkort-generator</h1>
      <p>Skapa en SoMe-bild för hemmamatcher på några sekunder.</p>
    </header>

    <main class="grid">
      <section class="panel">
        <h2>Matchinfo</h2>

        <div class="form">
          <label>
            Välj match
            <select id="matchSelect" disabled>
              <option value="">— Ladda CSV först —</option>
            </select>
          </label>

          <label>
            Bakgrund
            <select id="bgSelect"></select>
          </label>

          <label>
            Rubrik
            <input id="bannerText" type="text" value="MATCHDAG" />
          </label>

          <label>
            Hemmalag
            <input id="homeTeam" type="text" value="Säters IF FK" />
          </label>

          <label>
            Bortalag
            <input id="awayTeam" type="text" value="" />
          </label>

          <div class="row">
            <label>
              Datum
              <input id="date" type="date" />
            </label>
            <label>
              Tid
              <input id="time" type="time" value="19:00" />
            </label>
          </div>

          <label>
            Plats
            <input id="venue" type="text" value="Säters IP" />
          </label>

          <div class="row">
            <label>
              Hemmalogga (vid behov)
              <input id="homeLogo" type="file" accept="image/*" />
            </label>
            <label>
              Bortalogga (vid behov)
              <input id="awayLogo" type="file" accept="image/*" />
            </label>
          </div>

          <label>
            Bildformat
            <select id="format">              
              <option value="1080x1350" selected>Inlägg Facebook/Instagram (1080 x 1350)</option>
              <option value="1080x1920">Story Facebook/Instagram (1080 x 1920)</option>
            </select>
          </label>

          <div class="actions">
            <button id="renderBtn" class="btn">Uppdatera bild</button>
            <button id="downloadBtn" class="btn primary">Ladda ner bild</button>
          </div>

        </br></br>

            <label>
              Valfritt: Importera matchdata via CSV
              <input id="csvFile" type="file" accept=".csv,text/csv" />
            </label>
            
            <button id="loadCsvBtn" class="btn">Läs CSV</button>
            
        </div>
      </section>

      <section class="preview">
        <h2>Förhandsvisning</h2>
        <div class="canvasWrap">
          <canvas id="card"></canvas>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
